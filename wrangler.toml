name = "cryptoauto"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[build]
command = "npm run build"

[[kv_namespaces]]
binding = "STATE"
id = "YOUR_KV_ID"

[[kv_namespaces]]
binding = "USERS"
id = "YOUR_USERS_KV_ID"

[[kv_namespaces]]
binding = "TRADES"
id = "YOUR_TRADES_KV_ID"

[[kv_namespaces]]
binding = "METRICS"
id = "YOUR_METRICS_KV_ID"

[site]
bucket = "./public"
entry-point = "./functions"
