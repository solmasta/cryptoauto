name = "cryptoauto"
main = "functions/index.js"
compatibility_date = "2024-12-16"
compatibility_flags = ["nodejs_compat"]

account_id = "YOUR_ACCOUNT_ID_HERE"
workers_dev = true

[env.production]
name = "cryptoauto-production"
vars = { ENVIRONMENT = "production" }

[[kv_namespaces]]
binding = "STATE"
id = "YOUR_KV_STATE_ID"

[[kv_namespaces]]
binding = "REVENUE_DATA"
id = "YOUR_REVENUE_KV_ID"
